project:
  type: website

execute:
  freeze: auto

lang: fr

format:
  hebstr-template-html: default

website:
  title: "{{< var alisp >}}"
  site-url: https://alisp.fr/
  favicon: _img/sym.svg
  navbar:
    pinned: true
    logo: _img/logo-navbar.svg
    title: false
    right:
      - text: "Bureau"
        href: bureau/bureau.qmd
      - text: Actualités
        href: blog/index.qmd
      - text: Guide&nbsp;du&nbsp;néo-interne
        href: guide/index.qmd
      - text: "Aide&nbsp;méthodologique"
        href: aide/aide.qmd
  sidebar:
    - id: guide
      # style: "floating"
      contents: guide
  page-footer:
    left: |
      <span>
        {{< var year >}} [{{< var alisp >}}](https://annuaire-entreprises.data.gouv.fr/entreprise/association-lilloise-des-internes-en-sante-publique-alisp-514856012)
      </span>
      <br>
      <span>
        {{< iconify fa6-brands creative-commons >}}
        {{< iconify fa6-brands creative-commons-by >}}
        [CC BY 4.0](https://creativecommons.org/licenses/by/4.0/)
      </span>
    center: |
      <span>
        [{{< var links.mail.text >}}]({{< var links.mail.href >}})
        [{{< var links.insta.text >}}]({{< var links.insta.href >}})
        [{{< var links.twitter.text >}}]({{< var links.twitter.href >}})
        [{{< var links.facebook.text >}}]({{< var links.facebook.href >}})
        [{{< var links.linkedin.text >}}]({{< var links.linkedin.href >}})
      <span>
    right: |
      <span>
        Site conçu avec {{< iconify fa6-brands r-project title='R' >}} et
        [{{< iconify simple-icons quarto title='Quarto' >}}](https://quarto.org/)
      </span>
      <br>
      <span>[{{< var repo.text >}}]({{< var repo.href >}})</span>
