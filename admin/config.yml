backend:
  name: github
  repo: alisp59/site-alisp
  branch: main
  base_url: https://sveltia-cms-auth.asso-isp-lille.workers.dev

publish_mode: editorial_workflow

media_folder: blog/_media
public_folder: /blog/_media

collections:
  - name: blog
    label: Actualités
    label_singular: Article
    folder: blog
    path: "{{slug}}/index"
    media_folder: ""
    public_folder: ""
    create: true
    extension: qmd
    frontmatter_delimiter: "---"
    fields:
      - name: title
        label: Titre
        widget: string
      - name: author
        label: Auteur
        widget: string
      - name: date
        label: Date
        widget: datetime
        format: "DD-MM-YYYY"
        date_only: true
      - name: description
        label: Description
        widget: text
      - name: categories
        label: Catégories
        widget: list
      - name: image
        label: Image de couverture
        widget: image
        required: false
      - name: body
        label: Contenu
        widget: markdown

  - name: guide
    label: Guide du néo-interne
    label_singular: Page
    folder: guide
    create: true
    extension: qmd
    frontmatter_delimiter: "---"
    fields:
      - name: title
        label: Titre
        widget: string
      - name: date
        label: Date
        widget: datetime
        format: "YYYY-MM-DD"
        date_only: true
      - name: body
        label: Contenu
        widget: markdown

  - name: config
    label: Configuration du site
    files:
      - name: variables
        label: Variables globales
        file: _variables.yml
        format: yaml
        fields:
          - name: alisp
            label: Nom complet de l'association
            widget: string
          - name: year
            label: Années (pied de page)
            widget: string
          - name: social
            label: Réseaux sociaux
            widget: object
            fields:
              - name: mail
                label: Email
                widget: object
                fields:
                  - { name: href, label: Lien (mailto:…), widget: string }
              - name: insta
                label: Instagram
                widget: object
                fields:
                  - { name: href, label: URL, widget: string }
              - name: twitter
                label: X (Twitter)
                widget: object
                fields:
                  - { name: href, label: URL, widget: string }
              - name: facebook
                label: Facebook
                widget: object
                fields:
                  - { name: href, label: URL, widget: string }
              - name: linkedin
                label: LinkedIn
                widget: object
                fields:
                  - { name: href, label: URL, widget: string }
          - name: docs
            label: Documents PDF
            widget: object
            fields:
              - name: trombi
                label: Trombinoscope (chemin)
                widget: string
              - name: jorf
                label: JORF santé publique (chemin)
                widget: string
          - name: links
            label: Liens externes
            widget: object
            fields:
              - { name: license, label: Licence, widget: string }
              - { name: annuaire, label: Annuaire des entreprises, widget: string }
              - { name: airtable, label: Formulaire Airtable, widget: string }
              - { name: clisp, label: Newsletter CLISP, widget: string }
          - name: repo
            label: Dépôt source
            widget: object
            fields:
              - { name: text, label: Libellé, widget: string }
              - { name: href, label: URL, widget: string }
