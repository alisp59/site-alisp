backend:
  name: github
  repo: alisp59/site-alisp
  branch: main
  base_url: https://sveltia-cms-auth.asso-isp-lille.workers.dev

publish_mode: editorial_workflow

media_folder: _resources/sveltia
public_folder: /_resources/sveltia

collections:
  - name: blog
    label: Actualités
    label_singular: Article
    folder: blog
    path: "{{slug}}/index"
    media_folder: ""
    public_folder: ""
    create: true
    extension: qmd
    frontmatter_delimiter: "---"
    fields:
      - name: title
        label: Titre
        widget: string
      - name: author
        label: Auteur
        widget: string
      - name: date
        label: Date
        widget: datetime
        format: "DD-MM-YYYY"
        date_only: true
      - name: description
        label: Description
        widget: text
      - name: categories
        label: Catégories
        widget: list
      - name: image
        label: Image de couverture
        widget: image
        required: false
      - name: body
        label: Contenu
        widget: markdown

  - name: guide
    label: Guide du néo-interne
    label_singular: Page
    folder: guide
    media_folder: "resources"
    public_folder: "resources"
    create: true
    extension: qmd
    frontmatter_delimiter: "---"
    fields:
      - name: title
        label: Titre
        widget: string
      - name: date
        label: Date
        widget: datetime
        format: "YYYY-MM-DD"
        date_only: true
        required: false
      - name: body
        label: Contenu
        widget: markdown
