title: hebstr-template
author: hebstr
version: 0.9.0
quarto-required: ">=1.7.0"
contributes:
  formats:
    common:
      published-title: "dernière mise à jour"
      knitr:
        opts_chunk:
          comment: "#>"
          collapse: true
          echo: false
          message: false
          warning: false
    html:
      toc: true
      toc-depth: 2
      smooth-scroll: true
      title-block-banner: true
      colorlinks: true
      code-link: true
      code-fold: true
      callout-appearance: simple
      html-table-processing: none
      default-image_extension: svg
      footnotes-hover: true
      theme: resources/theme.scss
      css: resources/fonts.css
