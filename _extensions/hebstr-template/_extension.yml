title: hebstr-template
author: hebstr
version: 0.9.0
quarto-required: ">=1.7.0"
contributes:
  formats:
    common:
      published-title: "dernière mise à jour"
      knitr:
        opts_chunk:
          comment: "#>"
          collapse: true
          echo: false
          message: false
          warning: false
    html:
      toc: false
      smooth-scroll: true
      title-block-banner: true
      colorlinks: true
      callout-appearance: simple
      html-table-processing: none
      footnotes-hover: true
      theme: resources/theme.scss
      css: resources/fonts.css
      include-in-header:
        - text: '<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">'
